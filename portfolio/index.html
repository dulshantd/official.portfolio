<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Dulshan - ICT Undergraduate">
    <title>Dulshan | Tech Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --terminal-green: #00ff41;
            --hacker-red: #ff003c;
            --glass-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            background-color: var(--bg-color);
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            line-height: 1.6;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            padding-bottom: 50px;
            border-bottom: 1px solid var(--hacker-red);
        }

        .profile-img {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 3px solid var(--hacker-red);
            box-shadow: 0 0 20px var(--hacker-red);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 { color: var(--hacker-red); text-transform: uppercase; letter-spacing: 5px; }

        section { margin: 60px 0; }
        h2 { color: var(--hacker-red); border-left: 5px solid var(--hacker-red); padding-left: 15px; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Card Setup */
        .project-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(30px);
        }

        .project-card.appear { opacity: 1; transform: translateY(0); }

        .project-card:hover {
            border-color: var(--hacker-red);
            box-shadow: 0 0 15px var(--hacker-red);
        }

        .project-img { width: 100%; height: 150px; object-fit: cover; border: 1px solid #444; }

        /* --- MODAL STYLES --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 10000; 
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-color);
            border: 2px solid var(--hacker-red);
            padding: 30px;
            width: 80%;
            max-width: 700px;
            position: relative;
            box-shadow: 0 0 30px var(--hacker-red);
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 20px;
            color: var(--hacker-red);
            font-size: 30px;
            cursor: pointer;
        }

        #modal-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .red-text { color: var(--hacker-red); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="images/profile.jpg" alt="Dulshan" class="profile-img">
        <h1>Hello, I'm <span class="red-text">Dulshan</span></h1>
        <p>ICT Undergraduate | Networking & Cloud Enthusiast</p>
    </header>

    <section id="projects">
        <h2>> Featured_Projects</h2>
        <div class="project-grid">
            <div class="project-card" onclick="openModal('Bank Management System', 'Full description: A secure C-based system featuring file handling for data persistence and multi-user account management.', 'images/project1.jpg')">
                <img src="images/project1.jpg" alt="Bank" class="project-img">
                <h3 class="red-text">Bank Management System</h3>
                <p>Click to view system details...</p>
            </div>

            <div class="project-card" onclick="openModal('Java Applications', 'Full description: Developed various OOP-based tools including simple GUI calculators and database connectors.', 'images/project2.jpg')">
                <img src="images/project2.jpg" alt="Java" class="project-img">
                <h3 class="red-text">Java Applications</h3>
                <p>Click to view OOP projects...</p>
            </div>

            <div class="project-card" onclick="openModal('Networking Learning', 'Full description: Extensive labs on Cisco Packet Tracer involving VLANs, OSPF routing, and IPv4 subnetting.', 'images/project3.jpg')">
                <img src="images/project3.jpg" alt="Network" class="project-img">
                <h3 class="red-text">Networking Learning</h3>
                <p>Click to view network labs...</p>
            </div>
        </div>
    </section>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" alt="Project Preview">
            <h2 id="modal-title" class="red-text"></h2>
            <p id="modal-desc" style="color: #ccc;"></p>
        </div>
    </div>
</div>

<script>
    // 1. OPEN MODAL FUNCTION
    function openModal(title, desc, imgPath) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        document.getElementById('modal-img').src = imgPath;
        document.getElementById('projectModal').style.display = 'flex';
    }

    // 2. CLOSE MODAL FUNCTION
    function closeModal() {
        document.getElementById('projectModal').style.display = 'none';
    }

    // Close if user clicks outside the box
    window.onclick = function(event) {
        let modal = document.getElementById('projectModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    // 3. SCROLL ANIMATION
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('appear');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.project-card').forEach(card => {
        observer.observe(card);
    });
</script>

</body>
</html>
