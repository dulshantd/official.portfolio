<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulshan | Tech Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --terminal-green: #00ff41;
            --hacker-red: #ff003c;
            --glass-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            background-color: var(--bg-color);
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        header {
            text-align: center;
            padding-bottom: 50px;
            border-bottom: 1px solid var(--hacker-red);
        }

        /* Profile Image Fixes */
        .profile-img {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 3px solid var(--hacker-red);
            box-shadow: 0 0 20px var(--hacker-red);
            object-fit: cover;
            margin-bottom: 20px;
            background: #111; /* Shows if image fails */
        }

        h1 { color: var(--hacker-red); text-transform: uppercase; letter-spacing: 5px; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(30px);
        }

        .project-card.appear { opacity: 1; transform: translateY(0); }

        .project-card:hover {
            border-color: var(--hacker-red);
            box-shadow: 0 0 15px var(--hacker-red);
        }

        .project-img { 
            width: 100%; height: 180px; 
            object-fit: cover; 
            border: 1px solid #444;
            background: #222;
        }

        /* MODAL (Popup) */
        .modal {
            display: none; position: fixed; z-index: 10000; 
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--bg-color);
            border: 2px solid var(--hacker-red);
            padding: 30px; width: 90%; max-width: 600px;
            position: relative; box-shadow: 0 0 30px var(--hacker-red);
        }

        .close-btn {
            position: absolute; top: 10px; right: 20px;
            color: var(--hacker-red); font-size: 30px; cursor: pointer;
        }

        #modal-img { width: 100%; max-height: 250px; object-fit: cover; margin-bottom: 20px; border: 1px solid var(--hacker-red); }

        .red-text { color: var(--hacker-red); }
        .contact-item { margin: 10px 0; border: 1px solid var(--terminal-green); padding: 10px; display: inline-block; margin-right: 10px;}
        a { color: var(--terminal-green); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="profile.png" alt="Dulshan" class="profile-img" onerror="this.src='https://via.placeholder.com/180?text=Dulshan'">
        <h1>Hello, I'm <span class="red-text">Dulshan</span></h1>
        <p>ICT Undergraduate | Networking & Cloud Enthusiast</p>
    </header>

    <section id="projects">
        <h2 class="red-text">> Featured_Projects</h2>
        <div class="project-grid">
            
            <div class="project-card" onclick="openModal('Bank Management System', 'A C-based system with file handling for secure data management.', 'project1.png')">
                <img src="project1.png" alt="Project 1" class="project-img" onerror="this.src='https://via.placeholder.com/300x180?text=Bank+System'">
                <h3 class="red-text">Bank Management System</h3>
                <p>Click for details...</p>
            </div>

            <div class="project-card" onclick="openModal('Java Applications', 'OOP focused applications with GUI elements.', 'project2.png')">
                <img src="project2.png" alt="Project 2" class="project-img" onerror="this.src='https://via.placeholder.com/300x180?text=Java+App'">
                <h3 class="red-text">Java Applications</h3>
                <p>Click for details...</p>
            </div>

        </div>
    </section>

    <section id="contact">
        <h2 class="red-text">> Connection_Portal</h2>
        <div class="contact-item">GITHUB: <a href="https://github.com/dulshantd" target="_blank">dulshantd</a></div>
        <div class="contact-item">LINKEDIN: <a href="https://linkedin.com/in/dulshan-dissanayaka" target="_blank">Connect</a></div>
    </section>
</div>

<div id="projectModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="Project Detail">
        <h2 id="modal-title" class="red-text"></h2>
        <p id="modal-desc"></p>
    </div>
</div>

<script>
    function openModal(title, desc, img) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        document.getElementById('modal-img').src = img;
        document.getElementById('projectModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('projectModal').style.display = 'none';
    }

    window.onclick = function(e) {
        if (e.target.className === 'modal') closeModal();
    }

    const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('appear'); });
    }, {threshold: 0.1});

    document.querySelectorAll('.project-card').forEach(card => obs.observe(card));
</script>

</body>
</html>
