<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulshan | Tech Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --terminal-green: #00ff41;
            --hacker-red: #ff003c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; border-bottom: 2px solid var(--hacker-red); padding-bottom: 30px; }

        /* Profile Photo with Glitch */
        .glitch-wrapper {
            position: relative;
            width: 150px; height: 150px;
            margin: 0 auto 20px;
            border: 2px solid var(--hacker-red);
            border-radius: 50%;
            overflow: hidden;
        }

        .profile-img { width: 100%; height: 100%; object-fit: cover; }

        .glitch-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: inherit; opacity: 0;
        }

        .glitch-wrapper:hover .glitch-layer {
            opacity: 1;
            animation: glitch-effect 0.3s infinite;
            background: var(--hacker-red);
            mix-blend-mode: multiply;
        }

        @keyframes glitch-effect {
            0% { clip-path: inset(10% 0 30% 0); transform: translate(-5px); }
            50% { clip-path: inset(50% 0 10% 0); transform: translate(5px); }
            100% { clip-path: inset(20% 0 60% 0); transform: translate(-2px); }
        }

        h1 { color: var(--hacker-red); letter-spacing: 3px; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--hacker-red); box-shadow: 0 0 10px var(--hacker-red); }

        .card img { width: 100%; height: 150px; object-fit: cover; background: #222; }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            text-decoration: none;
        }

        .btn:hover { background: var(--terminal-green); color: #000; }

        #backToTop {
            position: fixed; bottom: 20px; right: 20px;
            background: black; color: var(--hacker-red);
            border: 1px solid var(--hacker-red);
            padding: 10px; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="glitch-wrapper">
            <img src="profile.jpg" alt="Dulshan" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=profile.jpg'">
            <div class="glitch-layer"></div>
        </div>
        <h1>DULSHAN | TECH</h1>
        <p>ICT Undergraduate | SEUSL | Networking & Cloud</p>
    </header>

    <section id="projects">
        <h2 style="color: var(--hacker-red);">[SISTEM_PROJECTS]</h2>
        <div class="project-grid">
            <div class="card">
                <img src="project1.jpg" onerror="this.src='https://via.placeholder.com/300x150?text=project1.jpg'">
                <h3>Bank Management</h3>
                <p>C-Language secure system.</p>
            </div>
            <div class="card">
                <img src="project2.jpg" onerror="this.src='https://via.placeholder.com/300x150?text=project2.jpg'">
                <h3>Java Core Apps</h3>
                <p>OOP & Database Projects.</p>
            </div>
        </div>
    </section>

    <footer style="margin-top: 50px; text-align: center; border-top: 1px solid #333; padding-top: 20px;">
        <p>Connect: <a href="https://github.com/dulshantd" class="btn">GitHub</a></p>
    </footer>
</div>

<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP</button>

<script>
    window.onscroll = function() {
        let btn = document.getElementById("backToTop");
        if (document.documentElement.scrollTop > 200) btn.style.display = "block";
        else btn.style.display = "none";
    };
</script>

</body>
</html>
