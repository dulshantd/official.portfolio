    <style>

            margin: 10px;
            padding: 10px 20px;
            border: 1px solid #00ff41;
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover { background: #00ff41; color: #000; }
    </style>
